<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>개념 정리 마인드맵</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#07080f;
  font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  overflow:hidden;user-select:none;}
#vp{position:fixed;inset:0;cursor:grab;}
#vp.grabbing{cursor:grabbing;}
#svg-root{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;}
#node-layer{position:absolute;top:0;left:0;pointer-events:none;}

/* 노드 */
.nd{
  position:absolute;
  transform:translate(-50%,-50%) scale(0);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  text-align:center;font-weight:600;line-height:1.2;
  word-break:keep-all;padding:3px;
  cursor:pointer;pointer-events:all;
  transition: transform 0.3s cubic-bezier(.34,1.4,.64,1),
              opacity 0.25s ease,
              left 0.4s cubic-bezier(.25,.8,.25,1),
              top 0.4s cubic-bezier(.25,.8,.25,1),
              width 0.4s, height 0.4s, font-size 0.4s;
  opacity:0;
  will-change: transform;
}
.nd.visible{transform:translate(-50%,-50%) scale(1);opacity:1;}
.nd.hiding{transform:translate(-50%,-50%) scale(0);opacity:0;}
.nd:hover{filter:brightness(1.18);z-index:20!important;}
.nd.has-ch::after{content:'';position:absolute;
  width:9px;height:9px;border-radius:50%;
  background:rgba(255,255,255,0.92);
  border:1.5px solid #07080f;bottom:-1px;right:-1px;}
.nd.open::after{content:'−';background:rgba(255,65,65,0.95);
  font-size:9px;line-height:9px;color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;}

/* 선 */
.edge{transition:opacity 0.3s ease, d 0.4s ease;}

/* 툴팁 */
#tip{position:fixed;display:none;z-index:999;pointer-events:none;
  background:rgba(8,12,28,0.97);border:1px solid rgba(255,255,255,0.13);
  border-radius:12px;padding:13px 15px;max-width:260px;
  box-shadow:0 8px 28px rgba(0,0,0,0.8);}
#tip-title{font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;}
#tip-desc{font-size:11px;color:rgba(200,215,245,0.65);line-height:1.55;margin-bottom:7px;}
#tip-fs .tf{background:rgba(255,255,255,0.05);border-radius:6px;color:#fff;
  padding:7px 9px;margin-bottom:4px;border-left:2px solid rgba(245,214,61,0.55);}
#tip-fs .tfl{font-size:9px;color:rgba(245,214,61,0.7);margin-bottom:2px;}

/* 탭/컨트롤 */
#tabs{position:fixed;top:14px;left:14px;display:flex;gap:8px;z-index:200;
  background:rgba(10,14,30,0.75);backdrop-filter:blur(10px);
  padding:7px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);}
.tb{padding:7px 16px;font-size:13px;font-family:inherit;font-weight:600;
  border-radius:8px;border:1.5px solid rgba(255,255,255,0.18);
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.7);
  cursor:pointer;transition:all .2s;letter-spacing:0.01em;}
.tb:hover{color:#fff;background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.35);}
.am{border-color:#5b9cf6!important;color:#5b9cf6!important;background:rgba(91,156,246,0.18)!important;}
.as{border-color:#4ecb8d!important;color:#4ecb8d!important;background:rgba(78,203,141,0.18)!important;}
.ap{border-color:#f07ab0!important;color:#f07ab0!important;background:rgba(240,122,176,0.18)!important;}
#ctrl{position:fixed;top:14px;right:14px;display:flex;gap:7px;z-index:200;
  background:rgba(10,14,30,0.75);backdrop-filter:blur(10px);
  padding:7px 10px;border-radius:12px;border:1px solid rgba(255,255,255,0.1);}
#ctrl button{padding:7px 14px;font-size:13px;font-family:inherit;font-weight:500;
  background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.18);
  border-radius:8px;color:rgba(255,255,255,0.7);cursor:pointer;transition:all .2s;}
#ctrl button:hover{color:#fff;background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.35);}
#tip-fs .tf .katex{color:#fff!important;}
#tip-fs .tf .katex *{color:#fff!important;}
#hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,0.16);pointer-events:none;white-space:nowrap;}
</style>
</head>
<body>
<div id="vp">
  <svg id="svg-root" width="100%" height="100%">
    <g id="edge-group"></g>
  </svg>
  <div id="node-layer"></div>
</div>
<div id="tabs">
  <button class="tb am" onclick="switchTab('math')">📐 수학</button>
  <button class="tb"    onclick="switchTab('sci')">🔬 과학</button>
  <button class="tb"    onclick="switchTab('phys')">⚡ 물리학</button>
</div>
<div id="ctrl">
  <button onclick="resetView()">⌂ 중앙</button>
  <button onclick="resetAll()">↺ 처음</button>
</div>
<div id="tip">
  <div id="tip-title"></div>
  <div id="tip-desc"></div>
  <div id="tip-fs"></div>
</div>
<div id="hint">클릭: 펼치기/접기 &nbsp;·&nbsp; 마우스오버: 수식 &nbsp;·&nbsp; 드래그: 이동 &nbsp;·&nbsp; 스크롤: 줌</div>

const DBS={math:MATH,sci:SCI,phys:PHYS};
const ROOTS={math:'zero',sci:'sci_root',phys:'phys_root'};

/* ═══ 엔진 ══════════════════════════════════════ */
let curTab='math', DB=MATH;
let panX=0, panY=60, sc=1;
let openSet=new Set();

// 레이아웃: id -> {x,y}  (월드 좌표, 변환 없음)
const layout={};
const domMap={};   // id -> div
const edgeMap={};  // 'pid>cid' -> path el
const nl=document.getElementById('node-layer');
const edgeG=document.getElementById('edge-group');

const NS='http://www.w3.org/2000/svg';
const GAP_Y=140, PAD=16;

/* ── 레이아웃 ── */
function subtreeW(id){
  if(!DB[id]) return 0;
  const r=DB[id].r;
  if(!openSet.has(id)) return r*2+PAD;
  const ch=(DB[id].ch||[]).filter(c=>DB[c]);
  if(!ch.length) return r*2+PAD;
  return Math.max(r*2+PAD, ch.reduce((s,c)=>s+subtreeW(c),0));
}
function assignLayout(id,cx,depth){
  if(!DB[id]) return;
  layout[id]={x:cx, y:depth*GAP_Y};
  if(!openSet.has(id)) return;
  const ch=(DB[id].ch||[]).filter(c=>DB[c]);
  if(!ch.length) return;
  const ws=ch.map(c=>subtreeW(c));
  const total=ws.reduce((a,b)=>a+b,0);
  let lx=cx-total/2;
  ch.forEach((c,i)=>{assignLayout(c,lx+ws[i]/2,depth+1);lx+=ws[i];});
}

/* ── 뷰→화면 변환 ── */
function w2s(wx,wy){
  return{x: wx*sc+panX+window.innerWidth/2,
         y: wy*sc+panY};
}

/* ── 노드 DOM ── */
function ensureNode(id){
  if(domMap[id]) return;
  const data=DB[id]; if(!data) return;
  const el=document.createElement('div');
  el.className='nd'+(((data.ch||[]).filter(c=>DB[c]).length)?' has-ch':'');
  const sz=data.r*2;
  el.style.cssText=`width:${sz}px;height:${sz}px;background:${data.c};
    color:${isDark(data.c)?'#fff':'#111'};
    font-size:${Math.max(9,data.r*0.29)}px;
    box-shadow:0 0 ${data.r*0.65}px ${data.c}44,0 2px 8px #0008;
    border:2px solid ${lighten(data.c,32)};z-index:${10};`;
  el.textContent=data.lb;
  el.addEventListener('mouseenter',e=>showTip(id,e));
  el.addEventListener('mousemove', e=>moveTip(e));
  el.addEventListener('mouseleave',  ()=>hideTip());
  el.addEventListener('click',e=>{if(!wasDragged){e.stopPropagation();toggle(id);}});
  domMap[id]=el;
  nl.appendChild(el);
}

function placeNode(id){
  const el=domMap[id]; if(!el||!layout[id]) return;
  const data=DB[id];
  const {x,y}=w2s(layout[id].x, layout[id].y);
  const sz=data.r*2*sc;
  el.style.left=x+'px'; el.style.top=y+'px';
  el.style.width=sz+'px'; el.style.height=sz+'px';
  el.style.fontSize=Math.max(8,data.r*0.29*sc)+'px';
  el.classList.toggle('open', openSet.has(id));
  el.classList.toggle('has-ch',(data.ch||[]).filter(c=>DB[c]).length>0);
  requestAnimationFrame(()=>el.classList.add('visible'));
}

function removeNode(id){
  const el=domMap[id]; if(!el) return;
  el.classList.remove('visible');
  el.classList.add('hiding');
  setTimeout(()=>{el.remove();delete domMap[id];},280);
}

/* ── 엣지 ── */
function ensureEdge(pid,cid){
  const key=pid+'>'+cid;
  if(edgeMap[key]) return;
  const path=document.createElementNS(NS,'path');
  path.setAttribute('fill','none');
  path.setAttribute('stroke',DB[pid]?.c||'#888');
  path.setAttribute('stroke-opacity','0.3');
  path.setAttribute('stroke-width','1.5');
  path.style.transition='opacity 0.3s';
  path.style.opacity='0';
  edgeMap[key]=path;
  edgeG.appendChild(path);
  requestAnimationFrame(()=>{path.style.opacity='1';});
}

function placeEdge(pid,cid){
  const key=pid+'>'+cid;
  const path=edgeMap[key]; if(!path||!layout[pid]||!layout[cid]) return;
  const p=w2s(layout[pid].x,layout[pid].y);
  const c=w2s(layout[cid].x,layout[cid].y);
  const pr=DB[pid].r*sc, cr=DB[cid].r*sc;
  const x1=p.x,y1=p.y+pr, x2=c.x,y2=c.y-cr, my=(y1+y2)/2;
  path.setAttribute('d',`M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
  path.setAttribute('stroke-width',Math.max(1,1.4*sc));
}

function removeEdge(pid,cid){
  const key=pid+'>'+cid;
  const path=edgeMap[key]; if(!path) return;
  path.style.opacity='0';
  setTimeout(()=>{path.remove();delete edgeMap[key];},280);
}

/* ── 전체 동기화 ── */
function syncAll(){
  const rid=ROOTS[curTab];
  assignLayout(rid,0,0);

  // 표시해야 할 노드/엣지 수집
  const visNodes=new Set(), visEdges=new Set();
  function collect(id){
    if(!DB[id]) return;
    visNodes.add(id);
    if(openSet.has(id)){
      (DB[id].ch||[]).filter(c=>DB[c]).forEach(c=>{
        visEdges.add(id+'>'+c);
        collect(c);
      });
    }
  }
  collect(rid);

  // 없어진 엣지 제거
  Object.keys(edgeMap).forEach(k=>{if(!visEdges.has(k)){const[p,c]=k.split('>');removeEdge(p,c);}});
  // 없어진 노드 제거
  Object.keys(domMap).forEach(k=>{if(!visNodes.has(k)) removeNode(k);});

  // 새 엣지/노드 추가 & 위치 갱신
  visEdges.forEach(k=>{const[p,c]=k.split('>');ensureEdge(p,c);});
  visNodes.forEach(id=>{ensureNode(id);placeNode(id);});
  visEdges.forEach(k=>{const[p,c]=k.split('>');placeEdge(p,c);});
}

/* ── 토글 ── */
function toggle(id){
  const hasCh=(DB[id]?.ch||[]).filter(c=>DB[c]).length>0;
  if(!hasCh) return;
  if(openSet.has(id)) collapseAll(id);
  else openSet.add(id);
  syncAll();
}
function collapseAll(id){
  openSet.delete(id);
  (DB[id]?.ch||[]).forEach(c=>{if(DB[c]) collapseAll(c);});
}

/* ── 패닝/줌 (렌더 없이 CSS만) ── */
function applyView(){
  Object.keys(domMap).forEach(id=>placeNode(id));
  Object.keys(edgeMap).forEach(k=>{const[p,c]=k.split('>');placeEdge(p,c);});
}

/* ── 툴팁 ── */
let tipHideTimer=null;
function showTip(id,e){
  clearTimeout(tipHideTimer);
  const data=DB[id]; if(!data) return;
  document.getElementById('tip-title').textContent=data.lb;
  document.getElementById('tip-desc').textContent=data.d||'';
  const fsEl=document.getElementById('tip-fs'); fsEl.innerHTML='';
  (data.fs||[]).forEach(fm=>{
    if(!fm?.f) return;
    const div=document.createElement('div'); div.className='tf';
    if(fm.l){const l=document.createElement('div');l.className='tfl';l.textContent=fm.l;div.appendChild(l);}
    const eq=document.createElement('div');
    if(window.katex){try{katex.render(fm.f,eq,{throwOnError:false,displayMode:false});}catch(err){eq.textContent=fm.f;}}
    else eq.textContent=fm.f;
    div.appendChild(eq); fsEl.appendChild(div);
  });
  document.getElementById('tip').style.display='block';
  moveTip(e);
}
function moveTip(e){
  const tip=document.getElementById('tip');
  if(tip.style.display==='none') return;
  const tw=tip.offsetWidth||260, th=tip.offsetHeight||100;
  let tx=e.clientX+14, ty=e.clientY-10;
  if(tx+tw>window.innerWidth-4) tx=e.clientX-tw-8;
  if(ty+th>window.innerHeight-4) ty=window.innerHeight-th-8;
  tip.style.left=Math.max(4,tx)+'px'; tip.style.top=Math.max(4,ty)+'px';
}
function hideTip(){
  tipHideTimer=setTimeout(()=>{document.getElementById('tip').style.display='none';},100);
}

/* ── 탭 / 리셋 ── */
function switchTab(tab){
  curTab=tab; DB=DBS[tab];
  openSet.clear();
  Object.keys(domMap).forEach(k=>{domMap[k]?.remove();delete domMap[k];});
  Object.keys(edgeMap).forEach(k=>{edgeMap[k]?.remove();delete edgeMap[k];});
  Object.keys(layout).forEach(k=>delete layout[k]);
  panX=0; panY=60; sc=1;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('am','as','ap'));
  document.querySelector(`.tb[onclick="switchTab('${tab}')"]`).classList.add(
    tab==='math'?'am':tab==='sci'?'as':'ap');
  hideTip(); syncAll();
}
function resetAll(){openSet.clear();panX=0;panY=60;sc=1;switchTab(curTab);}
function resetView(){panX=0;panY=60;sc=1;applyView();}

/* ── 입력 ── */
let isPan=false,dragX=0,dragY=0,psx=0,psy=0,wasDragged=false;
const vp=document.getElementById('vp');
vp.addEventListener('mousedown',e=>{
  if(e.target.closest('#tabs')||e.target.closest('#ctrl')||e.target.closest('#tip')) return;
  isPan=true; wasDragged=false;
  dragX=e.clientX; dragY=e.clientY; psx=panX; psy=panY;
  vp.classList.add('grabbing');
});
document.addEventListener('mousemove',e=>{
  if(!isPan) return;
  const dx=e.clientX-dragX,dy=e.clientY-dragY;
  if(Math.abs(dx)>3||Math.abs(dy)>3) wasDragged=true;
  panX=psx+dx; panY=psy+dy;
  applyView();
});
document.addEventListener('mouseup',()=>{isPan=false;vp.classList.remove('grabbing');});
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:0.91;
  const mx=e.clientX-window.innerWidth/2, my=e.clientY;
  panX=mx-(mx-panX)*f; panY=my-(my-panY)*f;
  sc=Math.max(0.15,Math.min(4,sc*f));
  applyView();
},{passive:false});
let lt=0;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isPan=true;wasDragged=false;dragX=e.touches[0].clientX;dragY=e.touches[0].clientY;psx=panX;psy=panY;}
  if(e.touches.length===2) lt=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:false});
vp.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&isPan){const dx=e.touches[0].clientX-dragX,dy=e.touches[0].clientY-dragY;if(Math.abs(dx)>3||Math.abs(dy)>3)wasDragged=true;panX=psx+dx;panY=psy+dy;applyView();}
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);sc=Math.max(0.15,Math.min(4,sc*d/lt));lt=d;applyView();}
},{passive:false});
vp.addEventListener('touchend',()=>{isPan=false;});
window.addEventListener('resize',()=>applyView());

function isDark(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000<155;}
function lighten(h,a){return`rgb(${Math.min(255,parseInt(h.slice(1,3),16)+a)},${Math.min(255,parseInt(h.slice(3,5),16)+a)},${Math.min(255,parseInt(h.slice(5,7),16)+a)})`;}

switchTab('math');
</script>
